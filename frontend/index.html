<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Optics</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700&family=JetBrains+Mono:wght@400;500&family=Pixelify+Sans:wght@400..700&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="styles.css" />
        <script src="script.js" defer></script>
    </head>
    <body>
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-row">
                    <img src="public/Sticker.svg" alt="RISE" class="logo-img" />
                    <span class="logo-text">optics</span>
                    <span class="beta-tag">BETA</span>
                </div>
            </div>

            <div class="steps-container" id="stepsContainer">
                <div class="empty-state" id="emptyState">
                    <div class="empty-logo">
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            viewBox="0 0 981 508"
                            fill="none"
                        >
                            <path
                                d="M 220 312 L 207 313 L 166 327 L 12 387 L 5 394 L 1 403 L 0 429 L 8 461 L 16 477 L 26 491 L 33 498 L 44 505 L 59 507 L 261 430 L 261 426 L 239 396 L 223 360 L 220 350 Z M 216 317 L 216 351 L 220 364 L 236 399 L 255 425 L 255 428 L 57 503 L 48 502 L 40 498 L 31 490 L 21 477 L 13 462 L 4 429 L 5 404 L 9 396 L 15 390 L 170 330 L 208 317 Z M 535 156 L 251 263 L 238 274 L 234 281 L 230 296 L 230 323 L 236 352 L 242 369 L 256 396 L 269 414 L 279 424 L 291 431 L 303 433 L 329 429 L 368 413 L 437 389 L 452 381 L 582 331 L 601 320 L 598 314 L 576 287 L 558 254 L 545 215 L 541 194 L 541 168 Z M 533 161 L 537 169 L 537 194 L 541 216 L 551 248 L 569 284 L 596 319 L 524 350 L 451 377 L 436 385 L 364 410 L 328 425 L 305 429 L 295 428 L 285 423 L 273 412 L 258 391 L 247 370 L 240 351 L 235 329 L 235 291 L 241 277 L 249 269 Z M 877 24 L 870 30 L 864 49 L 866 86 L 875 122 L 892 158 L 908 182 L 921 195 L 939 205 L 946 205 L 955 195 L 960 175 L 959 145 L 947 101 L 934 72 L 916 45 L 895 27 L 884 23 Z M 878 28 L 883 27 L 895 32 L 912 47 L 928 70 L 943 102 L 951 127 L 956 152 L 955 181 L 953 189 L 945 201 L 940 201 L 929 195 L 912 180 L 897 158 L 881 126 L 873 100 L 868 70 L 869 44 L 873 33 Z M 917 16 L 906 8 L 890 1 L 869 2 L 717 58 L 595 106 L 584 112 L 574 126 L 569 144 L 568 176 L 571 201 L 577 227 L 587 253 L 600 278 L 619 304 L 633 317 L 648 326 L 662 330 L 678 330 L 929 235 L 962 221 L 972 209 L 979 187 L 980 147 L 977 124 L 969 97 L 955 66 L 934 34 Z M 915 20 L 931 37 L 949 64 L 963 93 L 972 120 L 976 148 L 975 186 L 971 201 L 965 212 L 959 218 L 681 325 L 662 326 L 654 324 L 639 316 L 626 305 L 611 287 L 597 264 L 584 235 L 578 215 L 573 186 L 572 154 L 577 130 L 586 116 L 601 108 L 726 59 L 870 6 L 889 5 L 901 10 Z"
                                fill="currentColor"
                                fill-rule="evenodd"
                            />
                        </svg>
                    </div>
                    <h3>No lesson loaded</h3>
                    <p>Type a topic below to generate a visual explanation</p>
                </div>
            </div>

            <div class="sidebar-footer">
                <form class="search-box" id="promptForm">
                    <svg
                        class="search-icon"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                    >
                        <circle cx="11" cy="11" r="8" />
                        <line x1="21" y1="21" x2="16.65" y2="16.65" />
                    </svg>
                    <input
                        type="text"
                        id="promptInput"
                        placeholder="What do you want to learn?"
                        autocomplete="off"
                    />
                    <button type="submit" class="search-submit">
                        <svg viewBox="0 0 24 24">
                            <path d="M5 12h14M12 5l7 7-7 7" />
                        </svg>
                    </button>
                </form>
            </div>
        </aside>

        <main class="main-content">
            <div class="video-wrapper" id="videoWrapper">
                <div class="video-placeholder" id="videoPlaceholder">
                    <svg
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="1"
                        stroke-linecap="round"
                    >
                        <rect x="2" y="2" width="20" height="20" rx="4" />
                        <polygon
                            points="10 8 16 12 10 16 10 8"
                            fill="currentColor"
                            stroke="none"
                        />
                    </svg>
                    <span>Your lesson will appear here</span>
                </div>
            </div>
            <div class="progress-bar" id="progressBar" style="display: none">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </main>
    </body>
</html>
